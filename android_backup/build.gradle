buildscript {
    ext.kotlin_version = '1.7.10' // Örnek bir güncel sürüm, projenize göre ayarlayın
    repositories {
        google()
        mavenCentral() // jcenter() yerine bunu kullan
    }

    dependencies {
        classpath 'com.android.tools.build:gradle:7.1.2' // Gradle versiyonunu da güncelleyebiliriz
        classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:$kotlin_version"
    }
}

allprojects {
    repositories {
        google()
        mavenCentral() // jcenter() yerine bunu kullan
    }
}

rootProject.buildDir = '../build'
subprojects {
    project.buildDir = "${rootProject.buildDir}/${project.name}"
}
subprojects {
    project.evaluationDependsOn(':app')
}

tasks.register("clean", Delete) {
    delete rootProject.layout.buildDirectory
}

version: '3.8'
services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: biomed
      POSTGRES_USER: biomed
      POSTGRES_PASSWORD: biomed
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data

  minio:
    image: minio/minio:latest
    command: server /data
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    ports:
      - '9000:9000'
    volumes:
      - miniodata:/data

  api:
    build: ./server
    working_dir: /usr/src/app
    volumes:
      - ./server:/usr/src/app
    ports:
      - '3000:3000'
    env_file:
      - ./server/.env
    depends_on:
      - postgres
      - minio

volumes:
  pgdata:
  miniodata:

name: biomed_serv
description: "Biyomedikal destek"
publish_to: 'none'

version: 1.3.1+7

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Veritabanı
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # State Management
  provider: ^6.0.5

  # Tarih Formatlama
  intl: ^0.19.0

  # İmza
  signature: ^5.3.0

  # Grafikler
  fl_chart: ^0.64.0

  # Dosya İşlemleri
  file_picker: ^8.0.7
  csv: ^5.0.2
  path: ^1.9.0
  path_provider: ^2.1.1

  # PDF & Paylaşım
  pdf: ^3.10.4
  share_plus: ^7.1.0

  # Barkod
  mobile_scanner: ^6.0.2

  # Collections (for groupBy)
  collection: ^1.18.0

  # Color Picker
  flutter_colorpicker: ^1.0.3

  # File Open
  open_filex: ^4.5.0

  # Local Notifications
  flutter_local_notifications: ^17.2.3
  timezone: ^0.9.4

  # 🔊 Ses Efektleri
  audioplayers: ^6.0.0

  # Yedekleme ve Ek Dosya İşlemleri
  permission_handler: ^11.3.0
  archive: ^3.4.10

  # Excel
  excel: ^4.0.2

  # Rehber (Contacts) Erişimi - Modern Flutter Contacts
  flutter_contacts: ^1.1.9+2

  # URL Launcher (Telefon, E-posta, Harita)
  url_launcher: ^6.2.5

  # 📸 OCR - Kamera ve Görsel
  image_picker: ^1.0.7
  google_mlkit_text_recognition: ^0.13.0

  # 📄 A4 Belge Tarama ve PDF
  cunning_document_scanner: ^1.2.0

  # QR Kod Oluşturma ve Okuma
  qr_flutter: ^4.1.0

  # Internet Bağlantısı Kontrolü
  connectivity_plus: ^5.0.2

  # 🗺️ OpenStreetMap Adres Arama (Ücretsiz, API key gerektirmez)
  http: ^1.2.0
  printing: ^5.14.3
  package_info_plus: ^9.0.1

  # 🎙️ Sesli Komut (speech_to_text) - KALDIRILDI (stabil değil)
  # ileriki versiyonda değerlendirilecek
  # speech_to_text: 6.4.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0

  # Hive Kod Üretimi
  hive_generator: ^2.0.0
  build_runner: ^2.4.5

  # 🎯 Uygulama İkonları
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true

  # 🔊 Ses Efektleri
  assets:
    - assets/sounds/
    - assets/branding/biomed_servis_logo.png

  fonts:
    - family: OpenSans
      fonts:
        - asset: assets/fonts/OpenSans-Regular.ttf
        - asset: assets/fonts/OpenSans-Bold.ttf
          weight: 700

# 🎯 Uygulama İkonları Yapılandırması
# Kurumsal logo kaynakları
flutter_icons:
  android: true
  ios: true
  image_path: "BIOMED_SERVIS_LOGO/02_ANDROID_APK/PlayStore_512.png"
  image_path_android: "BIOMED_SERVIS_LOGO/02_ANDROID_APK/PlayStore_512.png"
  image_path_ios: "BIOMED_SERVIS_LOGO/02_ANDROID_APK/PlayStore_512.png"
